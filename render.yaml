services:
  - type: web
    name: meet-sphere-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromDatabase:
          name: mongodb
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: mongodb
    databaseName: community-events
    plan: free
    ipAllowList: []
